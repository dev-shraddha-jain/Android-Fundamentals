
<h2 class="sr-only">Android app launch flow — an animated step-by-step walkthrough of how Android starts an app from tap to first screen</h2>
<style>
  :root {
    --color-border-secondary: #e2e8f0;
    --color-border-tertiary: #cbd5e1;
    --color-border-info: #94a3b8;
    --color-text-primary: #334155;
    --color-text-secondary: #64748b;
    --color-text-tertiary: #94a3b8;
    --color-text-info: #64748b;
    --color-text-success: #10b981;
    --color-text-warning: #d97706;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f8fafc;
    --color-background-info: #f1f5f9;
    --color-background-success: #ecfdf5;
    --color-background-warning: #fef3c7;
    --border-radius-lg: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    margin: 0;
    color: var(--color-text-primary);
  }

  @media (prefers-reduced-motion: no-preference) {
    .step-enter { animation: fadeSlide 0.35s ease forwards; }
  }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--color-border-secondary); transition: background 0.2s, transform 0.2s; flex-shrink: 0; }
  .dot.active { background: var(--color-text-info); transform: scale(1.3); }
  .dot.done { background: var(--color-text-success); }
  .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .tag-user { background: var(--color-background-info); color: var(--color-text-info); }
  .tag-system { background: var(--color-background-warning); color: var(--color-text-warning); }
  .tag-app { background: var(--color-background-success); color: var(--color-text-success); }
  .flow-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 10px 0 4px; }
  .flow-box { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--color-border-secondary); color: var(--color-text-secondary); background: var(--color-background-secondary); }
  .flow-box.hi { border-color: var(--color-border-info); color: var(--color-text-info); background: var(--color-background-info); font-weight: 500; }
  .flow-arr { color: var(--color-text-tertiary); font-size: 13px; }
  .nav-btn { font-size: 13px; padding: 6px 18px; cursor: pointer; border-radius: 6px; border: 1px solid var(--color-border-secondary); background: white; color: var(--color-text-secondary); transition: all 0.2s; }
  .nav-btn:hover:not(:disabled) { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-primary); }
  .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<div style="padding: 1rem 0;">

  <div style="display:flex; gap:8px; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap;">
    <span id="dot-0" class="dot active"></span>
    <span id="dot-1" class="dot"></span>
    <span id="dot-2" class="dot"></span>
    <span id="dot-3" class="dot"></span>
    <span id="dot-4" class="dot"></span>
    <span id="dot-5" class="dot"></span>
    <span id="dot-6" class="dot"></span>
    <span id="dot-7" class="dot"></span>
    <span style="font-size:12px; color:var(--color-text-tertiary); margin-left:6px;" id="step-counter">Step 1 of 8</span>
  </div>

  <div id="card" style="border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1.25rem 1.5rem; background:var(--color-background-primary); min-height:210px;">
  </div>

  <div style="display:flex; gap:10px; margin-top:1rem; align-items:center;">
    <button class="nav-btn" id="btn-prev" onclick="move(-1)">← Prev</button>
    <button class="nav-btn" id="btn-next" onclick="move(1)">Next →</button>
    <button class="nav-btn" id="btn-auto" onclick="toggleAuto()" style="margin-left:auto;">▶ Auto-play</button>
  </div>
</div>

<script>
const steps = [
  {
    tag: 'user', tagLabel: 'User action',
    title: 'You tap the app icon',
    desc: 'The launcher (home screen app) detects your touch. It reads the app\'s package name and main Activity class from the icon\'s metadata, then fires an Intent — a message that says "I want to start this app."',
    flow: ['Launcher', 'Intent created', 'Sent to system'],
    highlight: 0,
    detail: 'An Intent is Android\'s universal message object. It carries the target app package, the Activity to open, and any extra data to pass along.'
  },
  {
    tag: 'system', tagLabel: 'System',
    title: 'ActivityManagerService (AMS) receives the Intent',
    desc: 'AMS is the brain of Android\'s process management, running inside the System Server. It checks: does a process for this app already exist? If no, it needs to create one from scratch.',
    flow: ['Intent arrives', 'AMS checks process table', 'Process missing → fork needed'],
    highlight: 2,
    detail: 'AMS keeps a table of every running app process. If your app was recently used, it might still be alive — in that case Android skips straight to resuming the Activity.'
  },
  {
    tag: 'system', tagLabel: 'System',
    title: 'Zygote forks a new process',
    desc: 'Zygote is a special pre-warmed process that already has the Android Runtime (ART) and core Java libraries loaded into memory. AMS tells Zygote to fork — creating an instant copy of itself as your app\'s new process.',
    flow: ['AMS → Zygote', 'fork()', 'New app process born'],
    highlight: 2,
    detail: 'Forking is extremely fast because the OS uses copy-on-write memory — the new process shares Zygote\'s memory pages until it needs to modify them. This is why Android apps start so quickly.'
  },
  {
    tag: 'system', tagLabel: 'System',
    title: 'ART initialises inside the new process',
    desc: 'The forked process now runs your app\'s code. Android Runtime (ART) takes over: it loads the app\'s compiled DEX bytecode and runs it through JIT or AOT compilation so it executes natively on the CPU.',
    flow: ['New process', 'ART loads DEX', 'JIT / AOT compile'],
    highlight: 2,
    detail: 'ART replaced the older Dalvik runtime in Android 5.0. AOT (Ahead-of-Time) compilation happens at install time; JIT happens at runtime for hot code paths.'
  },
  {
    tag: 'app', tagLabel: 'App code',
    title: 'Application.onCreate() runs',
    desc: 'The very first app code that executes. Your Application class initialises global state — crash reporters, analytics SDKs, dependency injection containers. This happens before any screen appears.',
    flow: ['ActivityThread starts', 'Application class loaded', 'onCreate() called'],
    highlight: 2,
    detail: 'A slow Application.onCreate() delays every cold start. Heavy SDKs should be initialised lazily (on first use) rather than here, to keep startup fast.'
  },
  {
    tag: 'app', tagLabel: 'App code',
    title: 'Activity.onCreate() runs',
    desc: 'AMS now tells your target Activity to start. onCreate() is called — this is where you call setContentView() to declare which XML layout to use, and wire up your ViewModel, RecyclerView, buttons, etc.',
    flow: ['AMS → ActivityThread', 'Activity.onCreate()', 'setContentView()'],
    highlight: 2,
    detail: 'The Activity lifecycle: onCreate → onStart → onResume. At onResume the Activity is fully visible and interactive. AMS orchestrates every transition.'
  },
  {
    tag: 'system', tagLabel: 'System',
    title: 'View inflation & layout measurement',
    desc: 'The XML layout file is parsed and each View object is created in memory (inflation). Then the system runs three passes: measure (how big?), layout (where?), and draw (render to a bitmap).',
    flow: ['XML parsed', 'Measure → Layout → Draw', 'Frame buffer ready'],
    highlight: 1,
    detail: 'This is the most expensive part of startup. Deeply nested layouts, too many views, or blocking work on the main thread all delay this step and cause a slow first frame.'
  },
  {
    tag: 'system', tagLabel: 'System',
    title: 'SurfaceFlinger composites and displays the frame',
    desc: 'SurfaceFlinger is Android\'s display compositor. It takes the rendered frame from your app, combines it with the status bar and navigation bar layers, and sends the final image to the display hardware. You see your app.',
    flow: ['App frame ready', 'SurfaceFlinger composites', 'Screen updated'],
    highlight: 2,
    detail: 'The entire launch — from tap to first frame — typically takes 300–800ms on modern hardware. The window is drawn with a splash screen placeholder while all the earlier steps complete.'
  }
];

const tagClass = { user: 'tag-user', system: 'tag-system', app: 'tag-app' };
let current = 0;
let autoTimer = null;

function render(idx) {
  const s = steps[idx];
  const card = document.getElementById('card');
  card.innerHTML = '';
  card.className = 'step-enter';
  void card.offsetWidth;

  const flowHtml = s.flow.map((f, i) =>
    `<span class="flow-box${i === s.highlight ? ' hi' : ''}">${f}</span>${i < s.flow.length - 1 ? '<span class="flow-arr">→</span>' : ''}`
  ).join('');

  card.innerHTML = `
    <span class="pill ${tagClass[s.tag]}">${s.tagLabel}</span>
    <div style="font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;">${s.title}</div>
    <div style="font-size:14px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:12px;">${s.desc}</div>
    <div class="flow-row">${flowHtml}</div>
    <div style="margin-top:12px;border-left:2px solid var(--color-border-info);padding-left:12px;font-size:12px;color:var(--color-text-secondary);line-height:1.5;">${s.detail}</div>
  `;

  for (let i = 0; i < steps.length; i++) {
    const d = document.getElementById('dot-' + i);
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
  }
  document.getElementById('step-counter').textContent = `Step ${idx + 1} of ${steps.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === steps.length - 1;
}

function move(dir) {
  const next = Math.max(0, Math.min(steps.length - 1, current + dir));
  if (next === current) return;
  current = next;
  render(current);
}

function toggleAuto() {
  const btn = document.getElementById('btn-auto');
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
    btn.textContent = '▶ Auto-play';
  } else {
    btn.textContent = '⏸ Pause';
    autoTimer = setInterval(() => {
      if (current < steps.length - 1) {
        current++;
        render(current);
      } else {
        clearInterval(autoTimer);
        autoTimer = null;
        btn.textContent = '▶ Auto-play';
      }
    }, 3000);
  }
}

render(0);
</script>
