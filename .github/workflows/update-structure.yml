name: Update Project Structure

on:
  push:
    paths:
      - '**/*.md'
  workflow_dispatch:

jobs:
  update-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate Structure JSON
        run: python scripts/update_structure.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add structure.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update project structure" && git push)
