<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Android Fundamentals | Under the Hood</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fira+Code&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="index.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-kotlin.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
</head>
<body>
  <div id="loading-bar"></div>
  
  <button id="sidebar-toggle" title="Table of Contents">☰</button>

  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>Table of Contents</h1>
      </div>
      <nav id="nav-container">
        <!-- Navigation sections will be injected here -->
      </nav>
    </aside>

    <main>
      <div class="content-wrapper">
        <article id="content" class="markdown-body">
          <!-- Markdown content will be rendered here -->
        </article>
        
        <div class="page-nav">
          <button id="prev-page" class="page-btn">← Previous Chapter</button>
          <button id="next-page" class="page-btn">Next Chapter →</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Constants
    const contentEl = document.getElementById('content');
    const navContainer = document.getElementById('nav-container');
    const loadingBar = document.getElementById('loading-bar');
    const prevBtn = document.getElementById('prev-page');
    const nextBtn = document.getElementById('next-page');

    let flatFileList = [];

    // Utility: Show error
    function showFatalError(msg, err) {
      console.error(msg, err);
      contentEl.innerHTML = `
        <div style="padding: 2rem; border: 2px solid var(--accent-color); border-radius: 8px; background: #fff;">
          <h2 style="color: var(--accent-color);">📖 Bookmark Lost</h2>
          <p>${msg}</p>
          <pre style="background: #eee; padding: 1rem; margin-top: 1rem; font-size: 0.8rem;">${err ? err.stack || err : 'Unknown error'}</pre>
        </div>
      `;
    }

    function configureMarked() {
      if (typeof marked === 'undefined') throw new Error('Marked.js failed to load');
      
      // Configure marked with standard GFM options
      marked.setOptions({
        gfm: true,
        breaks: false, // Changed from true to false to prevent unwanted <br> tags
        headerIds: true,
        mangle: false,
        smartLists: true,
        highlight: (code, lang) => {
          if (typeof Prism !== 'undefined' && Prism.languages[lang]) {
            return Prism.highlight(code, Prism.languages[lang], lang);
          }
          return code;
        }
      });
    }

    async function fetchMarkdown(path) {
      showLoading(true);
      try {
        const response = await fetch(path.startsWith('/') ? path : './' + path);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.text();
      } catch (err) {
        return `# ⚠️ Chapter Missing\n\n**Path:** \`${path}\`\n\n*This page seems to have been torn out.*`;
      } finally {
        showLoading(false);
      }
    }

    function showLoading(show) {
      if (!loadingBar) return;
      loadingBar.style.width = show ? '30%' : '100%';
      if (!show) setTimeout(() => loadingBar.style.width = '0', 300);
    }

    async function renderPage(path) {
      const cleanPath = path.startsWith('/') ? path.substring(1) : path;
      const markdown = await fetchMarkdown(cleanPath);
      
      const html = marked.parse(markdown);
      contentEl.innerHTML = html;
      
      // Fix relative image, iframe and link paths
      const currentDir = cleanPath.includes('/') ? cleanPath.substring(0, cleanPath.lastIndexOf('/') + 1) : '';
      
      contentEl.querySelectorAll('img, iframe').forEach(el => {
        const src = el.getAttribute('src');
        if (src && !src.startsWith('http') && !src.startsWith('/') && !src.startsWith('data:')) {
          el.src = currentDir + src;
        }
      });

      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (typeof Prism !== 'undefined') Prism.highlightAllUnder(contentEl);

      // Handle internal links
      contentEl.querySelectorAll('a').forEach(link => {
        const href = link.getAttribute('href');
        if (href && href.endsWith('.md')) {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo(resolvePath(cleanPath, href));
          });
        }
      });

      updateActiveNav(cleanPath);
      updateNavButtons(cleanPath);
    }

    function updateActiveNav(path) {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.getAttribute('data-path') === path);
        if (link.classList.contains('active')) link.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }

    function updateNavButtons(currentPath) {
      const idx = flatFileList.findIndex(f => f.path === currentPath);
      
      if (idx > 0) {
        prevBtn.style.visibility = 'visible';
        prevBtn.onclick = () => navigateTo(flatFileList[idx-1].path);
        prevBtn.innerText = `← ${flatFileList[idx-1].name.replace('.md', '').replace(/-/g, ' ')}`;
      } else {
        prevBtn.style.visibility = 'hidden';
      }

      if (idx < flatFileList.length - 1) {
        nextBtn.style.visibility = 'visible';
        nextBtn.onclick = () => navigateTo(flatFileList[idx+1].path);
        nextBtn.innerText = `${flatFileList[idx+1].name.replace('.md', '').replace(/-/g, ' ')} →`;
      } else {
        nextBtn.style.visibility = 'hidden';
      }
    }

    function resolvePath(currentPath, relativePath) {
      const currentDir = currentPath.includes('/') ? currentPath.substring(0, currentPath.lastIndexOf('/') + 1) : '';
      let resolved = currentDir + relativePath;
      const parts = resolved.split('/');
      const stack = [];
      for (const part of parts) {
        if (part === '..') stack.pop();
        else if (part !== '.' && part !== '') stack.push(part);
      }
      return stack.join('/');
    }

    function navigateTo(path) {
      window.location.hash = path;
    }

    function buildSidebar(structure) {
      navContainer.innerHTML = '';
      flatFileList = [];

      // Respect the order defined in structure.json

      structure.forEach(folder => {
        if (folder.files.length === 0) return;
        
        const section = document.createElement('div');
        section.className = 'nav-section';
        const title = folder.is_root ? (folder.name || 'Introduction') : folder.name;
        section.innerHTML = `<h2>${title}</h2><ul class="nav-links"></ul>`;
        const list = section.querySelector('ul');

        folder.files.forEach(file => {
          flatFileList.push(file);
          const li = document.createElement('li');
          const name = file.name.replace('.md', '').replace(/-/g, ' ');
          li.innerHTML = `<a class="nav-link" data-path="${file.path}">${name}</a>`;
          li.querySelector('a').addEventListener('click', () => navigateTo(file.path));
          list.appendChild(li);
        });
        navContainer.appendChild(section);
      });
    }

    async function init() {
      try {
        configureMarked();
        const response = await fetch('structure.json');
        const structure = await response.json();
        buildSidebar(structure);

        let initialPath = window.location.hash.slice(1) || 'README.md';
        await renderPage(initialPath);

        const sidebarToggle = document.getElementById('sidebar-toggle');
        const app = document.getElementById('app');
        sidebarToggle.addEventListener('click', () => {
          app.classList.toggle('sidebar-collapsed');
        });

        window.addEventListener('hashchange', () => {
          renderPage(window.location.hash.slice(1) || 'README.md');
        });

        // Keyboard Navigation
        window.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowLeft' && prevBtn.style.visibility !== 'hidden') prevBtn.click();
          if (e.key === 'ArrowRight' && nextBtn.style.visibility !== 'hidden') nextBtn.click();
        });

      } catch (err) {
        showFatalError('Failed to initialize book.', err);
      }
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
